version: 1.0.0
openapi: /bypass/openapi.json
events:
  - event: platform.commerce.order.status_changed
    condition: "and(eq(status,Processing),eq(product.id,{{ settings.product_id }}))"
    path: "/events/commerce/orders"
    task: true
plugs:
  - id: learn-extensions
    name: Learn about extensions
    description: Extensions are a powerful tool that allows customizing platform experience with your own scenarios and features
    socket: portal

  - id: guide
    name: Guide
    description: Read about essential basics of extensions development
    socket: portal.learn-extensions
    href: /static/guide.js

  - id: examples
    name: Examples
    description: Learn more about extensions UI SDK and its capabilities
    socket: portal.learn-extensions
    href: /static/examples.js

  - id: dialog
    name: Dialog example
    href: /static/dialog.js

  - id: wizard
    name: Wizard example
    href: /static/wizard.js

  # Convention for the "add" demo module: each plug below reuses the single
  # src/modules/add entry, but must declare its own `href` of the form
  # /static/add/{socket}.js. frontend/esbuild.config.js reads this file and
  # emits one per-socket bundle (with __SOCKET_ID__ baked in) for every plug
  # whose href starts with /static/add/. A new add-* plug is picked up
  # automatically — just keep the href in sync with the socket.
  - id: add-main-navigation
    name: Plug here
    description: Add your extension plug
    socket: portal
    href: /static/add/portal.js

  - id: add-commerce-orders-action
    name: Plug here
    description: Add your extension plug
    socket: portal.commerce.orders.actions
    href: /static/add/portal.commerce.orders.actions.js

  - id: add-commerce-orders-line-action
    name: Plug here
    description: Add your extension plug
    socket: portal.commerce.orders.line.actions
    href: /static/add/portal.commerce.orders.line.actions.js

  - id: add-commerce-order-details-tab
    name: Plug here
    description: Add your extension plug
    socket: portal.commerce.orders.order
    href: /static/add/portal.commerce.orders.order.js

  - id: add-commerce-order-details-action
    name: Plug here
    description: Add your extension plug
    socket: portal.commerce.orders.order.actions
    href: /static/add/portal.commerce.orders.order.actions.js

  - id: add-commerce-subscriptions-action
    name: Plug here
    description: Add your extension plug
